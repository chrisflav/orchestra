<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F6F7F9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C0E13" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Orchestra</title>
    <script>
      // Applies a saved theme before first paint. Inline and synchronous on purpose: anything
      // deferred to the bundle would let the system theme render first and then swap, which is
      // the flash this exists to prevent. No saved preference means the system decides, which
      // the stylesheet handles on its own.
      (function () {
        try {
          var saved = localStorage.getItem("orchestra-theme");
          if (saved === "light" || saved === "dark") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (e) {
          /* private mode: fall through to the system theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
